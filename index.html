<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Momo+Trust+Display&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <title>Sign-up Form</title>
  </head>

  <body>
    <main class="signup-page">
      <section class="image-panel">
        <img src="images/bike.png" alt="Barcelona street with bicycle">

        <div class="logo-banner">
          <img src="images/logo-panot.png" alt="Barcelona panot logo">

          <div class="brand-text">
            <h1 class="logo-title">Barcelona</h1>
            <p class="logo-subtitle">RIDES</p>
          </div>
        </div>
      </section>

      <section class="signup-content">
        <section class="signup-intro">
          <h1>Discover Barcelona by bike</h1>

          <p>
            Join curated cycling routes, local tips, and hidden spots across the city.
          </p>

          <div class="intro-callout">
            <div class="intro-callout-icon">
              <img src="images/icon-bike.svg" alt="">
            </div>

            <p>Create your account and start exploring today.</p>
          </div>
        </section>

        <section class="signup-form-section">
          <form class="signup-form">
            <h2>Create your account</h2>

            <div class="form-row">
              <div class="form-group">
                <label for="first-name">First name</label>

                <div class="input-wrapper">
                  <img src="images/user.svg" alt="" class="input-icon">

                  <input
                    type="text"
                    id="first-name"
                    name="first-name"
                    autocomplete="given-name"
                  >
                </div>
              </div>

              <div class="form-group">
                <label for="last-name">Last name</label>

                <div class="input-wrapper">
                  <img src="images/user.svg" alt="" class="input-icon">

                  <input
                    type="text"
                    id="last-name"
                    name="last-name"
                    autocomplete="family-name"
                  >
                </div>
              </div>

            </div>
            <div class="form-row">
            <div class="form-group">
                <label for="email">Email</label>

                <div class="input-wrapper">
                <img src="images/mail.svg" alt="" class="input-icon">

                <input
                    type="email"
                    id="email"
                    name="email"
                    autocomplete="email"
                >
                </div>
            </div>

            <div class="form-group">
                <label for="phone">Phone number</label>

                <div class="input-wrapper">
                <img src="images/smartphone.svg" alt="" class="input-icon">

                <input
                    type="tel"
                    id="phone"
                    name="phone"
                    autocomplete="tel"
                >
                </div>
            </div>
            </div>
            <div class="form-row">
            <div class="form-group">
                <label for="password">Password</label>

                <div class="input-wrapper">
                <img src="images/lock-keyhole.svg" alt="" class="input-icon">

                <input
                    type="password"
                    id="password"
                    name="password"
                    autocomplete="new-password"
                >
                  <button
                    type="button"
                    class="toggle-password"
                    aria-label="Show password"
                >
                    <img src="images/eye.svg" alt="">
                </button>
                </div>
            </div>

            <div class="form-group">
                <label for="confirm-password">Confirm password</label>

                <div class="input-wrapper">
                <img src="images/lock-keyhole.svg" alt="" class="input-icon">

                <input
                    type="password"
                    id="confirm-password"
                    name="confirm-password"
                    autocomplete="new-password"
                >
                </div>
            </div>
            </div>
          </form>
        </section>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
