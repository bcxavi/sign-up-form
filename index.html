<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Momo+Trust+Display&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <title>Sign-up Form</title>
</head>
<body>
    <main class="signup-page">
    <section class="image-panel">
        <img src="images/bike.png" alt="Barcelona street with bicycle">
        <div class="logo-banner">
        <img src="images/logo-panot.png" alt="Barcelona panot logo">
        <div class="brand-text">
            <h1 class="logo-title">Barcelona</h1>
            <p class="logo-subtitle">RIDES</p>
        </div>
        </div>
    </section>

    <section class="signup-content">
        <section class="signup-intro">
            <h1>Discover Barcelona by bike</h1>

            <p>
            Join curated cycling routes, local tips, and hidden spots across the city.
            </p>

            <div class="intro-callout">
            <div class="intro-callout-icon">
                <img src="images/icon-bike.svg" alt="">
            </div>
            <p>Create your account and start exploring today.</p>
            </div>
        </section>

    <section class="signup-form-section">
    <form class="signup-form">
        <h2>Create your account</h2>

        <div class="form-row">
        <div class="form-group">
            <label for="first-name">First name</label>
            <input type="text" id="first-name" name="first-name" autocomplete="given-name">
        </div>

        <div class="form-group">
            <label for="last-name">Last name</label>
            <input type="text" id="last-name" name="last-name" autocomplete="family-name">
        </div>
        </div>
    </form>
</section>
    </section>
    </main>
</body>
</html>
